output_dir: /workspace/ckpts/models/DeepSeek-R1-Distill-Qwen-1.5B/grpo_open_rs2_prime

# Dataset
model_post_train_dataset_name: open_rs2_prime
model_post_train_type: grpo

# Reward functions (same as Tina)
rl_post_train_reward_funcs:
- format
- accuracy
rl_post_train_reward_weights:
- 1.0
- 2.0

# PRIME configs (NEW)
use_implicit_prm: true
prm_beta: 0.05
prm_lr: 1.0e-06

# Base model
model_name_or_path: DeepSeek-R1-Distill-Qwen-1.5B
attn_implementation: flash_attention_2

# LoRA (same as Tina)
use_peft: true
lora_r: 32
lora_alpha: 128
lora_dropout: 0.05
lora_target_modules:
- q_proj
- k_proj
- v_proj
- o_proj
- down_proj
- up_proj
- gate_proj

# Training
bf16: true
use_vllm: true
vllm_device: cuda:1
vllm_gpu_memory_utilization: 0.3
vllm_max_model_len: 4608

gradient_accumulation_steps: 4
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false

# Logging
log_level: info
logging_first_step: true
logging_steps: 1
logging_strategy: steps

push_to_hub: false

# Optimizer & LR
learning_rate: 1.0e-06
lr_scheduler_type: cosine_with_min_lr
lr_scheduler_kwargs:
  min_lr_rate: 0.1

# Sequence length
max_prompt_length: 512
max_completion_length: 3584

# Training steps
max_steps: 1500
num_generations: 6
num_train_epochs: 1
per_device_train_batch_size: 6

# Save
overwrite_output_dir: true
save_strategy: steps
save_steps: 50
save_total_limit: 100

# Other
seed: 42
temperature: 0.7
warmup_ratio: 0.1
report_to:
- wandb
